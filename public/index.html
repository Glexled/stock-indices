<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A股指数对比</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .nav { display: flex; background: #111; padding: 5px; border-bottom: 1px solid #222; }
        .nav-btn { flex: 1; padding: 12px; text-align: center; font-size: 14px; color: #888; border: none; background: none; }
        .nav-btn.active { color: #fff; font-weight: bold; border-bottom: 2px solid #ff4d4f; }
        .indices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px; background: #080808; }
        .index-item { display: flex; justify-content: space-between; background: #161616; padding: 8px 10px; border-radius: 4px; font-size: 12px; opacity: 0.3; border: 1px solid transparent; }
        .index-item.active { opacity: 1; border-color: #333; }
        .index-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        #chart { flex: 1; width: 100%; background: #000; }
        .status { font-size: 10px; color: #444; text-align: center; padding: 5px; }
        .up { color: #ff4d4f; } .down { color: #00c853; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; font-size: 12px; z-index: 100; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <button class="nav-btn active" id="btn-minute" onclick="setMode('minute')">5日对比</button>
            <button class="nav-btn" id="btn-daily" onclick="setMode('daily')">日线历史</button>
        </div>
        <div id="grid" class="indices-grid"></div>
        <div id="chart"></div>
        <div id="loading">正在加载数据...</div>
        <div class="status" id="status">初始化中...</div>
    </div>
    <script>
        var META = {
            'sh000001': { name: '上证指数', color: '#FFFFFF' },
            'sh000016': { name: '上证50', color: '#2ECC71' },
            'sh000300': { name: '沪深300', color: '#4B9EFF' },
            'sh000905': { name: '中证500', color: '#FFD700' },
            'sh000852': { name: '中证1000', color: '#FF69B4' },
            'sh932000': { name: '中证2000', color: '#9370DB' },
            'sh000680': { name: '科创综指', color: '#00FFFF' },
            'sh000688': { name: '科创50', color: '#FFA500' },
            'sz399006': { name: '创业板指', color: '#00FA9A' }
        };
        var selected = new Set(Object.keys(META));
        var currentMode = 'minute';
        var rawData = {};
        var chart = echarts.init(document.getElementById('chart'));

        function setMode(mode) {
            if (currentMode === mode) return;
            currentMode = mode;
            document.getElementById('btn-minute').className = 'nav-btn' + (mode === 'minute' ? ' active' : '');
            document.getElementById('btn-daily').className = 'nav-btn' + (mode === 'daily' ? ' active' : '');
            update();
        }

        function toggle(code) {
            if (selected.has(code)) { if(selected.size > 1) selected.delete(code); }
            else { selected.add(code); }
            render();
        }

        function update() {
            document.getElementById('loading').className = '';
            fetch('/api/minute?mode=' + currentMode)
                .then(function(r){ return r.json(); })
                .then(function(json){
                    if(json.ok) {
                        rawData = json.data;
                        render();
                        document.getElementById('status').innerText = (json.is_mock?'休市':'实时') + ' | ' + json.updated;
                    }
                })
                .finally(function(){ document.getElementById('loading').className = 'hidden'; });
        }

        function render() {
            var gridHtml = '';
            var series = [];
            var xAxis = [];
            var codes = Object.keys(META);
            for(var i=0; i<codes.length; i++) {
                var code = codes[i];
                var m = META[code];
                var pts = rawData[code] || [];
                var last = pts[pts.length-1] || {pct:0};
                gridHtml += '<div class="index-item '+(selected.has(code)?'active':'')+'" onclick="toggle(\''+code+'\')">' +
                    '<span><i class="index-dot" style="background:'+m.color+'"></i>'+m.name+'</span>' +
                    '<span class="'+(last.pct>=0?'up':'down')+'">'+(last.pct>=0?'+':'')+last.pct+'%</span>' +
                '</div>';
                if(selected.has(code) && pts.length > 0) {
                    if(xAxis.length === 0) { for(var j=0; j<pts.length; j++) xAxis.push(pts[j].time); }
                    var data = []; for(var k=0; k<pts.length; k++) data.push(pts[k].pct);
                    series.push({
                        name: m.name, type: 'line', data: data, showSymbol: false, smooth: true,
                        itemStyle: { color: m.color }, lineStyle: { width: 2 }
                    });
                }
            }
            document.getElementById('grid').innerHTML = gridHtml;
            chart.setOption({
                backgroundColor: '#000',
                tooltip: { 
                    trigger: 'axis', backgroundColor: 'rgba(30,30,30,0.9)', borderColor: '#444', textStyle: { color: '#fff', fontSize: 12 }, confine: true,
                    formatter: function(params) {
                        var sorted = params.slice().sort(function(a,b){ return (b.value||0)-(a.value||0); });
                        var res = '<div style="margin-bottom:5px;font-weight:bold;border-bottom:1px solid #444;padding-bottom:3px;">'+params[0].name+'</div>';
                        for(var i=0; i<sorted.length; i++) {
                            res += '<div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:2px;">' +
                                '<span><i style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+sorted[i].color+';margin-right:5px;"></i>'+sorted[i].seriesName+'</span>' +
                                '<span style="color:'+(sorted[i].value>=0?'#ff4d4f':'#00c853')+';font-weight:bold;">'+(sorted[i].value>=0?'+':'')+sorted[i].value+'%</span>' +
                            '</div>';
                        }
                        return res;
                    }
                },
                grid: { top: 20, left: 45, right: 15, bottom: 25 },
                xAxis: { type: 'category', data: xAxis, axisLabel: { color: '#555', fontSize: 10, interval: Math.floor(xAxis.length/5),
                    formatter: function(v) { return currentMode==='minute' ? (v.indexOf('09:30')>-1?v.split(' ')[0].substring(5):'') : v.substring(5); }
                }},
                yAxis: { type: 'value', axisLabel: { color: '#555', fontSize: 10, formatter: '{value}%' }, splitLine: { lineStyle: { color: '#111' } }, scale: true },
                series: series
            }, true);
        }
        update();
        setInterval(function(){ if(currentMode==='minute') update(); }, 20000);
        window.onresize = function(){ chart.resize(); };
    </script>
</body>
</html>
