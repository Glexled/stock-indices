<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>A股主要指数对比</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #000; color: #e0e0e0; }
    .header { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; }
    .header h1 { font-size: 18px; text-align: center; }
    .summary { padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; background: #111; }
    .item { display: flex; align-items: center; font-size: 14px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .pct { margin-left: auto; font-weight: bold; }
    #chart { width: 100%; height: 50vh; min-height: 350px; margin-top: 10px; }
    .status { text-align: center; font-size: 12px; color: #666; padding: 10px; }
    .up { color: #ff4d4f; }
    .down { color: #00c853; }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="title">A股主要指数对比 (5s刷新)</h1>
  </div>
  <div class="summary" id="summary">加载中...</div>
  <div id="chart"></div>
  <div class="status" id="status">正在连接数据源...</div>

  <script>
    const INDICES = {
      'sh000001': { name: '上证指数', color: '#FFFFFF' },
      'sh000300': { name: '沪深300', color: '#4B9EFF' },
      'sh000016': { name: '上证50', color: '#2ECC71' },
      'sh000905': { name: '中证500', color: '#FFD700' },
      'sh000852': { name: '中证1000', color: '#FF69B4' },
      'sh932000': { name: '中证2000', color: '#9370DB' },
      'sh000688': { name: '科创综指', color: '#00FFFF' },
      'sz399006': { name: '创业板指', color: '#00FA9A' }
    };

    let myChart = echarts.init(document.getElementById('chart'));

    async function update() {
      try {
        const res = await fetch('/api/minute');
        const json = await res.json();
        if (!json.ok) throw new Error('API Error');

        const data = json.data;
        const summary = document.getElementById('summary');
        let html = '';
        const series = [];
        let xAxis = [];

        for (const [code, info] of Object.entries(INDICES)) {
          const list = data[code] || [];
          if (list.length > 0) {
            const last = list[list.length - 1];
            const cls = last.pct >= 0 ? 'up' : 'down';
            html += `<div class="item">
              <div class="dot" style="background:${info.color}"></div>
              <span>${info.name}</span>
              <span class="pct ${cls}">${last.pct > 0 ? '+' : ''}${last.pct}%</span>
            </div>`;

            if (xAxis.length === 0) xAxis = list.map(i => i.time);
            series.push({
              name: info.name,
              type: 'line',
              data: list.map(i => i.pct),
              showSymbol: false,
              lineStyle: { width: 2 },
              itemStyle: { color: info.color }
            });
          }
        }
        summary.innerHTML = html;

        myChart.setOption({
          backgroundColor: '#000',
          tooltip: { trigger: 'axis' },
          grid: { top: 20, left: 40, right: 10, bottom: 30 },
          xAxis: { type: 'category', data: xAxis, axisLabel: { color: '#666', fontSize: 10 } },
          yAxis: { type: 'value', axisLabel: { color: '#666', formatter: '{value}%' }, splitLine: { lineStyle: { color: '#222' } } },
          series: series
        });

        document.getElementById('status').innerText = `更新时间: ${json.updated} ${json.is_mock ? '(休市演示数据)' : ''}`;
      } catch (e) {
        document.getElementById('status').innerText = '数据加载失败，正在重试...';
        console.error(e);
      }
    }

    update();
    setInterval(update, 5000);
    window.onresize = () => myChart.resize();
  </script>
</body>
</html>
