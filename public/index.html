<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A股指数对比</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .nav { display: flex; background: #111; padding: 5px; border-bottom: 1px solid #222; }
        .nav-btn { flex: 1; padding: 10px; text-align: center; font-size: 14px; color: #888; border: none; background: none; outline: none; }
        .nav-btn.active { color: #fff; font-weight: bold; border-bottom: 2px solid #ff4d4f; }
        
        .indices-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 10px; background: #080808; }
        .index-item { display: flex; justify-content: space-between; background: #161616; padding: 8px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
        .index-item.inactive { opacity: 0.3; }
        .index-item.highlight { border-color: #555; background: #222; }
        .index-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        
        #chart { flex: 1; width: 100%; }
        .status { font-size: 10px; color: #444; text-align: center; padding: 5px; }
        .up { color: #ff4d4f; } .down { color: #00c853; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <button class="nav-btn active" id="btn-minute" onclick="setMode('minute')">分时对比</button>
            <button class="nav-btn" id="btn-daily" onclick="setMode('daily')">日线历史</button>
        </div>
        <div class="indices-grid" id="grid"></div>
        <div id="chart"></div>
        <div class="status" id="status">正在同步数据...</div>
    </div>

    <script>
        const META = {
            'sh000001': { name: '上证指数', color: '#FFFFFF' },
            'sh000300': { name: '沪深300', color: '#4B9EFF' },
            'sh000016': { name: '上证50', color: '#2ECC71' },
            'sh000905': { name: '中证500', color: '#FFD700' },
            'sh000852': { name: '中证1000', color: '#FF69B4' },
            'sh932000': { name: '中证2000', color: '#9370DB' },
            'sh000688': { name: '科创综指', color: '#00FFFF' },
            'sz399006': { name: '创业板指', color: '#00FA9A' }
        };

        let currentMode = 'minute';
        let selectedIndices = new Set(Object.keys(META));
        const chart = echarts.init(document.getElementById('chart'));
        let rawData = {};

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            update();
        }

        function toggleIndex(code) {
            if (selectedIndices.has(code)) {
                if (selectedIndices.size > 1) selectedIndices.delete(code);
            } else {
                selectedIndices.add(code);
            }
            renderChart();
            renderGrid();
        }

        function highlightLine(code) {
            chart.dispatchAction({ type: 'highlight', seriesName: META[code].name });
        }

        function downplayLine(code) {
            chart.dispatchAction({ type: 'downplay', seriesName: META[code].name });
        }

        async function update() {
            try {
                const res = await fetch(`/api/minute?mode=${currentMode}`);
                const json = await res.json();
                if (!json.ok) return;
                rawData = json.data;
                renderChart();
                renderGrid();
                document.getElementById('status').innerText = `最后更新: ${json.updated} ${json.is_mock?'(休市演示)':''}`;
            } catch (e) { console.error(e); }
        }

        function renderGrid() {
            let gridHtml = '';
            for (const [code, meta] of Object.entries(META)) {
                const points = rawData[code] || [];
                if (points.length > 0) {
                    const last = points[points.length - 1];
                    const inactive = !selectedIndices.has(code) ? 'inactive' : '';
                    gridHtml += `
                        <div class="index-item ${inactive}" 
                             onclick="toggleIndex('${code}')" 
                             onmouseover="highlightLine('${code}')" 
                             onmouseout="downplayLine('${code}')">
                            <span><i class="index-dot" style="background:${meta.color}"></i>${meta.name}</span>
                            <span class="${last.pct>=0?'up':'down'}">${last.pct>=0?'+':''}${last.pct}%</span>
                        </div>`;
                }
            }
            document.getElementById('grid').innerHTML = gridHtml;
        }

        function renderChart() {
            const series = [];
            let xAxis = [];
            for (const [code, meta] of Object.entries(META)) {
                if (!selectedIndices.has(code)) continue;
                const points = rawData[code] || [];
                if (points.length > 0) {
                    if (xAxis.length === 0) xAxis = points.map(p => p.time);
                    series.push({
                        name: meta.name,
                        type: 'line',
                        data: points.map(p => p.pct),
                        showSymbol: false,
                        smooth: true,
                        itemStyle: { color: meta.color },
                        lineStyle: { width: 2 },
                        emphasis: { lineStyle: { width: 4, shadowBlur: 10, shadowColor: 'rgba(255,255,255,0.5)' } }
                    });
                }
            }

            chart.setOption({
                backgroundColor: '#000',
                legend: { show: false },
                tooltip: { 
                    trigger: 'axis', 
                    backgroundColor: '#222', 
                    borderColor: '#444', 
                    textStyle: { color: '#fff', fontSize: 11 },
                    order: 'valueDesc'
                },
                grid: { top: 20, left: 45, right: 15, bottom: 25 },
                xAxis: { 
                    type: 'category', 
                    data: xAxis, 
                    axisLabel: { color: '#555', fontSize: 10, interval: currentMode==='daily'?Math.floor(xAxis.length/5):60 }, 
                    axisLine: { lineStyle: { color: '#222' } } 
                },
                yAxis: { 
                    type: 'value', 
                    axisLabel: { color: '#555', fontSize: 10, formatter: '{value}%' }, 
                    splitLine: { lineStyle: { color: '#111' } },
                    scale: true
                },
                series: series
            }, true);
        }

        update();
        setInterval(() => { if(currentMode==='minute') update(); }, 5000);
        window.onresize = () => chart.resize();
    </script>
</body>
</html>
