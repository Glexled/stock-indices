<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>A股主要指数对比 | stock.akai-led.com</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #000000;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ===== 顶部栏 ===== */
    .topbar {
      background: #1a1a1a;
      padding: 12px 16px 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #333;
    }
    .topbar h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .topbar .update-time { font-size: 11px; color: #888; }

    /* ===== 涨跌幅汇总 ===== */
    .summary {
      background: #1a1a1a;
      padding: 10px 16px 12px;
      border-bottom: 1px solid #333;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px 12px;
    }
    .summary-item {
      display: flex; align-items: center; gap: 6px;
    }
    .s-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .s-name { font-size: 12px; color: #aaa; min-width: 50px; }
    .s-pct { font-size: 13px; font-weight: 700; }
    .up   { color: #ff4d4f; }
    .down { color: #00c853; }
    .flat { color: #888; }

    /* ===== 周期切换 ===== */
    .period-bar {
      background: #1a1a1a;
      padding: 8px 16px;
      border-bottom: 1px solid #333;
      display: flex; gap: 8px; overflow-x: auto;
    }
    .period-btn {
      padding: 6px 12px;
      border: 1px solid #444;
      background: transparent;
      color: #888;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .period-btn.active {
      background: #333;
      border-color: #666;
      color: #fff;
    }

    /* ===== 图表容器 ===== */
    #chart { width: 100%; height: calc(100vh - 200px); min-height: 400px; }

    /* ===== 加载状态 ===== */
    .loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 15px 30px;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      z-index: 9999;
      display: none;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📊 A股主要指数对比</h1>
    <div class="update-time" id="updateTime">正在初始化...</div>
  </div>

  <div class="summary" id="summary"></div>
  <div class="period-bar" id="periodBar"></div>
  <div id="chart"></div>
  <div class="loading" id="loading">加载中...</div>

  <script>
    // ===================== 配置 (同花顺风格配色) =====================
    const INDICES = {
      'sh000001': { name: '上证指数', color: '#FFFFFF' }, // 白色
      'sh000300': { name: '沪深300', color: '#4B9EFF' }, // 蓝色
      'sh000016': { name: '上证50', color: '#2ECC71' },  // 绿色
      'sh000905': { name: '中证500', color: '#FFD700' }, // 黄色
      'sh000852': { name: '中证1000', color: '#FF69B4' }, // 粉色
      'sh932000': { name: '中证2000', color: '#9370DB' }, // 紫色
      'sh000688': { name: '科创综指', color: '#00FFFF' }, // 青色
      'sz399006': { name: '创业板指', color: '#00FA9A' }, // 浅绿
    };

    const PERIODS = [
      { key: 'minute', label: '分时', default: true },
      { key: '5min', label: '5分' },
      { key: '30min', label: '30分' },
      { key: 'daily_10', label: '10日' },
      { key: 'daily_60', label: '3月' },
      { key: 'daily_250', label: '1年' },
    ];

    let chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });
    let currentPeriod = 'minute';
    let allData = {};

    // ===================== API 调用 =====================
    async function fetchData(period, isSilent = false) {
      if (!isSilent) document.getElementById('loading').style.display = 'block';
      try {
        let url = period === 'minute' ? '/api/minute' : `/api/kline?period=${period.split('_')[0]}&days=${period.split('_')[1] || 60}`;
        const response = await fetch(url);
        const result = await response.json();

        if (result.ok) {
          allData = result.data;
          updateSummary();
          updateChart();
          document.getElementById('updateTime').textContent = `更新: ${result.updated || new Date().toLocaleTimeString()}`;
        }
      } catch (error) {
        console.error('Fetch error:', error);
      } finally {
        if (!isSilent) document.getElementById('loading').style.display = 'none';
      }
    }

    // ===================== 更新汇总 =====================
    function updateSummary() {
      const summary = document.getElementById('summary');
      let html = '<div class="summary-grid">';
      for (const [symbol, info] of Object.entries(INDICES)) {
        const data = allData[symbol];
        if (!data || data.length === 0) continue;
        const lastPct = data[data.length - 1].pct || 0;
        const className = lastPct > 0 ? 'up' : lastPct < 0 ? 'down' : 'flat';
        html += `
          <div class="summary-item">
            <div class="s-dot" style="background: ${info.color}"></div>
            <div class="s-name">${info.name}</div>
            <div class="s-pct ${className}">${lastPct > 0 ? '+' : ''}${lastPct.toFixed(2)}%</div>
          </div>
        `;
      }
      summary.innerHTML = html + '</div>';
    }

    // ===================== 更新图表 =====================
    function updateChart() {
      const series = [];
      let xAxisData = [];
      let maxLen = 0;
      let baseSymbol = '';

      for (const symbol of Object.keys(INDICES)) {
        if (allData[symbol] && allData[symbol].length > maxLen) {
          maxLen = allData[symbol].length;
          baseSymbol = symbol;
        }
      }
      if (baseSymbol) xAxisData = allData[baseSymbol].map(item => item.time);

      for (const [symbol, info] of Object.entries(INDICES)) {
        const data = allData[symbol];
        if (!data) continue;
        series.push({
          name: info.name,
          type: 'line',
          data: data.map(item => item.pct),
          smooth: true,
          symbol: 'none',
          lineStyle: { width: 1.5 },
          color: info.color,
        });
      }

      chart.setOption({
        backgroundColor: '#000000',
        tooltip: { trigger: 'axis', backgroundColor: 'rgba(0,0,0,0.8)', textStyle: { color: '#fff' } },
        legend: { top: 'bottom', textStyle: { color: '#888', fontSize: 10 }, icon: 'circle' },
        grid: { left: '40', right: '20', top: '20', bottom: '60', containLabel: true },
        xAxis: { type: 'category', data: xAxisData, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { color: '#666', fontSize: 10 } },
        yAxis: { type: 'value', axisLabel: { color: '#666', formatter: '{value}%' }, splitLine: { lineStyle: { color: '#1a1a1a' } } },
        series: series
      }, true);
    }

    // ===================== 初始化 =====================
    function init() {
      const bar = document.getElementById('periodBar');
      PERIODS.forEach(p => {
        const btn = document.createElement('button');
        btn.className = `period-btn ${p.default ? 'active' : ''}`;
        btn.textContent = p.label;
        btn.onclick = () => {
          document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentPeriod = p.key;
          fetchData(p.key);
        };
        bar.appendChild(btn);
      });
      fetchData('minute');
      setInterval(() => { if (currentPeriod === 'minute') fetchData('minute', true); }, 5000);
    }

    window.addEventListener('load', init);
    window.addEventListener('resize', () => chart.resize());
  </script>
</body>
</html>
