<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A股指数对比</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        .container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .nav { display: flex; background: #111; padding: 5px; border-bottom: 1px solid #222; flex-shrink: 0; }
        .nav-btn { flex: 1; padding: 12px; text-align: center; font-size: 14px; color: #888; border: none; background: none; cursor: pointer; outline: none; }
        .nav-btn.active { color: #fff; font-weight: bold; border-bottom: 2px solid #ff4d4f; }
        .indices-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 10px; background: #080808; flex-shrink: 0; }
        .index-item { display: flex; justify-content: space-between; align-items: center; background: #161616; padding: 10px; border-radius: 4px; font-size: 12px; cursor: pointer; opacity: 0.3; transition: opacity 0.2s; border: 1px solid transparent; }
        .index-item.active { opacity: 1; border-color: #333; }
        .index-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        #chart-container { flex: 1; width: 100%; position: relative; background: #000; min-height: 0; }
        #chart { width: 100%; height: 100%; }
        .status { font-size: 10px; color: #444; text-align: center; padding: 8px; flex-shrink: 0; }
        .up { color: #ff4d4f; } .down { color: #00c853; }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .loading-overlay.hidden { display: none; }
        .spinner { width: 30px; height: 30px; border: 2px solid #333; border-top: 2px solid #ff4d4f; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <button class="nav-btn active" id="btn-minute" onclick="setMode('minute')">5日对比</button>
            <button class="nav-btn" id="btn-daily" onclick="setMode('daily')">日线历史</button>
        </div>
        <div id="grid" class="indices-grid"></div>
        <div id="chart-container">
            <div id="chart"></div>
            <div class="loading-overlay" id="loading"><div class="spinner"></div><div style="font-size:12px;color:#888">同步行情中...</div></div>
        </div>
        <div class="status" id="status">正在启动...</div>
    </div>
    <script>
        var META = {
            'sh000001': { name: '上证指数', color: '#FFFFFF' },
            'sh000016': { name: '上证50', color: '#2ECC71' },
            'sh000300': { name: '沪深300', color: '#4B9EFF' },
            'sh000905': { name: '中证500', color: '#FFD700' },
            'sh000852': { name: '中证1000', color: '#FF69B4' },
            'sh932000': { name: '中证2000', color: '#9370DB' },
            'sh000680': { name: '科创综指', color: '#00FFFF' },
            'sh000688': { name: '科创50', color: '#FFA500' },
            'sz399006': { name: '创业板指', color: '#00FA9A' }
        };
        var selected = new Set(Object.keys(META));
        var currentMode = 'minute';
        var rawData = {};
        var chart = echarts.init(document.getElementById('chart'));
        var isFirstLoad = true;
        var refreshTimer = null;

        function setMode(mode) {
            if (currentMode === mode) return;
            currentMode = mode;
            isFirstLoad = true;
            var btns = document.querySelectorAll('.nav-btn');
            for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
            document.getElementById('btn-'+mode).classList.add('active');
            update();
        }

        function toggle(code) {
            if (selected.has(code)) { if(selected.size > 1) selected.delete(code); }
            else { selected.add(code); }
            render(false);
        }

        function update() {
            if (isFirstLoad) document.getElementById('loading').classList.remove('hidden');
            fetch('/api/minute?mode=' + currentMode)
                .then(function(res) { return res.json(); })
                .then(function(json) {
                    if (json.ok) {
                        rawData = json.data;
                        render(true);
                        document.getElementById('status').innerText = (json.is_mock ? '休市静止' : '实时更新') + ' | ' + json.updated;
                        if (json.is_mock && currentMode === 'minute' && refreshTimer) {
                            clearInterval(refreshTimer);
                            refreshTimer = null;
                        }
                    }
                })
                .catch(function(e) { console.error(e); })
                .finally(function() {
                    document.getElementById('loading').classList.add('hidden');
                    isFirstLoad = false;
                });
        }

        function render(isNewData) {
            var gridHtml = '';
            var series = [];
            var xAxisData = [];
            var codes = Object.keys(META);
            
            for(var i=0; i<codes.length; i++) {
                var code = codes[i];
                var meta = META[code];
                var points = rawData[code] || [];
                var last = points[points.length-1] || {pct:0};
                gridHtml += '<div class="index-item ' + (selected.has(code)?'active':'') + '" onclick="toggle(\'' + code + '\')">' +
                    '<span><i class="index-dot" style="background:' + meta.color + '"></i>' + meta.name + '</span>' +
                    '<span class="' + (last.pct>=0?'up':'down') + '">' + (last.pct>=0?'+':'') + last.pct + '%</span>' +
                '</div>';
                if (selected.has(code) && points.length > 0) {
                    if (xAxisData.length === 0) {
                        for(var j=0; j<points.length; j++) xAxisData.push(points[j].time);
                    }
                    var pcts = [];
                    for(var k=0; k<points.length; k++) pcts.push(points[k].pct);
                    series.push({
                        name: meta.name, type: 'line', data: pcts,
                        showSymbol: false, smooth: true, itemStyle: { color: meta.color }, lineStyle: { width: 2 }
                    });
                }
            }
            document.getElementById('grid').innerHTML = gridHtml;
            
            chart.setOption({
                backgroundColor: '#000',
                animation: isNewData,
                tooltip: { 
                    trigger: 'axis', backgroundColor: 'rgba(34, 34, 34, 0.9)', borderColor: '#444', textStyle: { color: '#fff', fontSize: 12 }, confine: true,
                    formatter: function(params) {
                        var sorted = params.slice().sort(function(a, b) { return (b.value || 0) - (a.value || 0); });
                        var res = '<div style="margin-bottom:8px;font-weight:bold;border-bottom:1px solid #555;padding-bottom:5px;">' + params[0].name + '</div>';
                        for(var i=0; i<sorted.length; i++) {
                            var item = sorted[i];
                            res += '<div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:3px;">' +
                                '<span><i style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + item.color + ';margin-right:6px;"></i>' + item.seriesName + '</span>' +
                                '<span style="color:' + (item.value>=0?'#ff4d4f':'#00c853') + ';font-weight:bold;">' + (item.value>=0?'+':'') + item.value + '%</span>' +
                            '</div>';
                        }
                        return res;
                    }
                },
                grid: { top: 20, left: 50, right: 15, bottom: 25 },
                xAxis: { 
                    type: 'category', data: xAxisData, 
                    axisLabel: { color: '#555', fontSize: 10, interval: Math.floor(xAxisData.length/5),
                        formatter: function(v) { 
                            if(currentMode==='minute') return v.indexOf('09:30') > -1 ? v.split(' ')[0].substring(5) : '';
                            return v.substring(5);
                        }
                    },
                    axisLine: { lineStyle: { color: '#222' } }
                },
                yAxis: { type: 'value', axisLabel: { color: '#555', fontSize: 10, formatter: '{value}%' }, splitLine: { lineStyle: { color: '#111' } }, scale: true },
                series: series
            }, true);
        }

        update();
        refreshTimer = setInterval(function() { if(currentMode==='minute') update(); }, 5000);
        window.addEventListener('resize', function() { chart.resize(); });
    </script>
</body>
</html>
