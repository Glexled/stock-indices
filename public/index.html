<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A股指数对比</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .nav { display: flex; background: #111; padding: 5px; border-bottom: 1px solid #222; }
        .nav-btn { flex: 1; padding: 10px; text-align: center; font-size: 14px; color: #888; border: none; background: none; }
        .nav-btn.active { color: #fff; font-weight: bold; border-bottom: 2px solid #ff4d4f; }
        .indices-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 10px; background: #080808; }
        .index-item { display: flex; justify-content: space-between; background: #161616; padding: 8px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; opacity: 0.3; transition: opacity 0.2s; }
        .index-item.active { opacity: 1; }
        .index-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        #chart { flex: 1; width: 100%; }
        .status { font-size: 10px; color: #444; text-align: center; padding: 5px; }
        .up { color: #ff4d4f; } .down { color: #00c853; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <button class="nav-btn active" id="btn-minute" onclick="setMode('minute')">分时对比</button>
            <button class="nav-btn" id="btn-daily" onclick="setMode('daily')">日线历史</button>
        </div>
        <div id="grid" class="indices-grid"></div>
        <div id="chart"></div>
        <div class="status" id="status"></div>
    </div>
    <script>
        // 严格按市值从大到小排序
        const META = {
            'sh000001': { name: '上证指数', color: '#FFFFFF' },
            'sh000016': { name: '上证50', color: '#2ECC71' },
            'sh000300': { name: '沪深300', color: '#4B9EFF' },
            'sh000905': { name: '中证500', color: '#FFD700' },
            'sh000852': { name: '中证1000', color: '#FF69B4' },
            'sh932000': { name: '中证2000', color: '#9370DB' },
            'sh000688': { name: '科创综指', color: '#00FFFF' },
            'sz399006': { name: '创业板指', color: '#00FA9A' }
        };
        // 默认显示大中盘核心指数
        let selected = new Set(['sh000001', 'sh000016', 'sh000300', 'sh000905']);
        let currentMode = 'minute';
        let rawData = {};
        const chart = echarts.init(document.getElementById('chart'));

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+mode).classList.add('active');
            update();
        }

        function toggle(code) {
            if (selected.has(code)) { if(selected.size>1) selected.delete(code); }
            else { selected.add(code); }
            render();
        }

        async function update() {
            try {
                const res = await fetch(`/api/minute?mode=${currentMode}`);
                const json = await res.json();
                rawData = json.data;
                render();
                document.getElementById('status').innerText = `${json.is_mock?'休市静止模式':'实时模式'} | 更新: ${json.updated}`;
                if (json.is_mock) clearInterval(timer);
            } catch (e) {}
        }

        function render() {
            let gridHtml = '';
            const series = [];
            let xAxis = [];
            // 保持 META 的 key 顺序渲染
            Object.keys(META).forEach(code => {
                const meta = META[code];
                const points = rawData[code] || [];
                const last = points[points.length-1] || {pct:0};
                gridHtml += `<div class="index-item ${selected.has(code)?'active':''}" onclick="toggle('${code}')">
                    <span><i class="index-dot" style="background:${meta.color}"></i>${meta.name}</span>
                    <span class="${last.pct>=0?'up':'down'}">${last.pct>=0?'+':''}${last.pct}%</span>
                </div>`;
                if (selected.has(code) && points.length > 0) {
                    if (xAxis.length === 0) xAxis = points.map(p => p.time);
                    series.push({
                        name: meta.name, type: 'line', data: points.map(p => p.pct),
                        showSymbol: false, smooth: true, itemStyle: { color: meta.color }, lineStyle: { width: 2 }
                    });
                }
            });
            document.getElementById('grid').innerHTML = gridHtml;
            chart.setOption({
                backgroundColor: '#000',
                animation: !document.getElementById('status').innerText.includes('休市'),
                tooltip: { trigger: 'axis', backgroundColor: '#222', textStyle: { color: '#fff', fontSize: 11 }, order: 'valueDesc' },
                grid: { top: 20, left: 45, right: 15, bottom: 25 },
                xAxis: { type: 'category', data: xAxis, axisLabel: { color: '#555', fontSize: 10, interval: currentMode==='daily'?Math.floor(xAxis.length/5):60 } },
                yAxis: { type: 'value', axisLabel: { color: '#555', fontSize: 10, formatter: '{value}%' }, splitLine: { lineStyle: { color: '#111' } }, scale: true },
                series: series
            }, true);
        }

        update();
        let timer = setInterval(() => { if(currentMode==='minute') update(); }, 5000);
        window.onresize = () => chart.resize();
    </script>
</body>
</html>
