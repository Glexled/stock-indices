<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A股指数对比</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .nav { display: flex; background: #111; padding: 5px; border-bottom: 1px solid #222; }
        .nav-btn { flex: 1; padding: 10px; text-align: center; font-size: 14px; color: #888; border: none; background: none; }
        .nav-btn.active { color: #fff; font-weight: bold; border-bottom: 2px solid #ff4d4f; }
        
        .indices-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 10px; background: #080808; }
        .index-item { display: flex; justify-content: space-between; background: #161616; padding: 6px 10px; border-radius: 2px; font-size: 12px; }
        .index-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        #chart { flex: 1; width: 100%; }
        .status { font-size: 10px; color: #444; text-align: center; padding: 5px; }
        .up { color: #ff4d4f; } .down { color: #00c853; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <button class="nav-btn active" onclick="setMode('minute')">分时对比</button>
            <button class="nav-btn" onclick="setMode('daily')">日线历史</button>
        </div>
        <div class="indices-grid" id="grid"></div>
        <div id="chart"></div>
        <div class="status" id="status">正在同步数据...</div>
    </div>

    <script>
        const META = {
            'sh000001': { name: '上证指数', color: '#FFFFFF' },
            'sh000300': { name: '沪深300', color: '#4B9EFF' },
            'sh000016': { name: '上证50', color: '#2ECC71' },
            'sh000905': { name: '中证500', color: '#FFD700' },
            'sh000852': { name: '中证1000', color: '#FF69B4' },
            'sh932000': { name: '中证2000', color: '#9370DB' },
            'sh000688': { name: '科创综指', color: '#00FFFF' },
            'sz399006': { name: '创业板指', color: '#00FA9A' }
        };

        let currentMode = 'minute';
        const chart = echarts.init(document.getElementById('chart'));

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            update();
        }

        async function update() {
            try {
                const res = await fetch(`/api/minute?mode=${currentMode}`);
                const json = await res.json();
                if (!json.ok) return;

                let gridHtml = '';
                const series = [];
                let xAxis = [];

                for (const [code, meta] of Object.entries(META)) {
                    const points = json.data[code] || [];
                    if (points.length > 0) {
                        const last = points[points.length - 1];
                        gridHtml += `<div class="index-item"><span><i class="index-dot" style="background:${meta.color}"></i>${meta.name}</span><span class="${last.pct>=0?'up':'down'}">${last.pct>=0?'+':''}${last.pct}%</span></div>`;
                        if (xAxis.length === 0) xAxis = points.map(p => p.time);
                        series.push({ name: meta.name, type: 'line', data: points.map(p => p.pct), showSymbol: false, itemStyle: { color: meta.color }, lineStyle: { width: 1.5 } });
                    }
                }
                document.getElementById('grid').innerHTML = gridHtml;
                chart.setOption({
                    backgroundColor: '#000',
                    tooltip: { trigger: 'axis', backgroundColor: '#222', borderColor: '#444', textStyle: { color: '#fff', fontSize: 10 } },
                    grid: { top: 10, left: 40, right: 10, bottom: 20 },
                    xAxis: { type: 'category', data: xAxis, axisLabel: { color: '#555', fontSize: 9, interval: currentMode==='daily'?10:60 }, axisLine: { lineStyle: { color: '#222' } } },
                    yAxis: { type: 'value', axisLabel: { color: '#555', fontSize: 9, formatter: '{value}%' }, splitLine: { lineStyle: { color: '#111' } } },
                    series: series
                }, true);
                document.getElementById('status').innerText = `最后更新: ${json.updated} ${json.is_mock?'(休市演示)':''}`;
            } catch (e) { console.error(e); }
        }

        update();
        setInterval(() => { if(currentMode==='minute') update(); }, 5000);
        window.onresize = () => chart.resize();
    </script>
</body>
</html>
